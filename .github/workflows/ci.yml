name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  fedora:
    name: Fedora 44 build and tests
    runs-on: ubuntu-latest
    container: fedora:44

    steps:
      - name: Install build dependencies
        run: >-
          dnf install -y git gcc-c++ cmake ninja-build python3 sqlite-devel
          fcitx5 fcitx5-devel hunspell hunspell-ru
          qt6-qtbase-devel qt6-qtdeclarative-devel
          pkgconf-pkg-config cairo-devel pango-devel gdk-pixbuf2-devel
          glib2-devel wayland-devel wayland-protocols-devel libxcb-devel
          xcb-util-devel xcb-util-wm-devel xcb-util-keysyms-devel

      - name: Check out source
        uses: actions/checkout@v6

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel 2

      - name: Test
        run: ctest --test-dir build --output-on-failure
